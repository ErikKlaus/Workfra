name: tugas_16_flutter
description: "Workfra - Attendance Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  lottie: ^3.1.3
  image_picker: ^1.1.2
  get_it: ^8.0.3
  pin_code_fields: ^9.3.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.3
  shimmer: ^3.0.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Icon Aplikasi.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/Icon Aplikasi.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/Logo 1.png
    - assets/images/Logo 2.png
    - assets/images/Icon Aplikasi.png
    - assets/animations/Smiling Owl.json
