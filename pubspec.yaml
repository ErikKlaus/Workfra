name: tugas_16_flutter
description: "Workfra - Attendance Management App"
publish_to: 'none'
version: 1.0.4+4

environment:
  sdk: ^3.10.8

dependencies:
  cloud_firestore: ^6.3.0
  connectivity_plus: ^6.1.4
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.3
  flutter_localizations:
    sdk: flutter
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.10.0
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  lottie: ^3.1.3
  permission_handler: ^11.3.1
  pin_code_fields: ^9.3.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  shimmer: ^3.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Icon Aplikasi.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/Icon Aplikasi.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - lib/core/localization/
